version: '3.8'

services:
  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=https://hmewyvjrsqdcfmdpvwmo.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_MONGODB_URL=mongodb+srv://jointomarry:JointoMarry@1427@cluster0.i04fqcu.mongodb.net/?appName=Cluster0
    depends_on:
      - backend
    networks:
      - webmotion-network

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/webmotion
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb+srv://jointomarry:JointoMarry%401427@cluster0.i04fqcu.mongodb.net/?appName=Cluster0
      - MONGODB_DB_NAME=webmotion
      - SUPABASE_URL=https://hmewyvjrsqdcfmdpvwmo.supabase.co
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - webmotion-network

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=webmotion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webmotion-network

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webmotion-network

volumes:
  postgres_data:
  redis_data:

networks:
  webmotion-network:
    driver: bridge
